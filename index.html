*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--color-surface-page);color:var(--color-text-primary);font-family:var(--font-body);min-height:100vh;overflow-x:hidden}

/* THEME BAR */
.theme-bar{display:flex;gap:4px;padding:8px 16px;background:var(--color-surface-secondary);align-items:center;justify-content:space-between}
.theme-bar button{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.6);font-size:12px;padding:5px 14px;border-radius:var(--r-pill);cursor:pointer;font-family:var(--font-body);transition:all 0.15s}
.theme-bar button:hover{background:rgba(255,255,255,0.16);color:rgba(255,255,255,0.9)}
.theme-bar button.active{background:var(--color-brand-primary);color:var(--color-text-on-brand);border-color:var(--color-brand-primary);font-weight:600}
.theme-bar-title{color:rgba(255,255,255,0.5);font-size:12px;font-family:var(--font-display);letter-spacing:0.08em;text-transform:uppercase}

/* HEADER */
.page-header{background:var(--color-surface-secondary);padding:1.75rem 2.5rem 1.5rem;border-bottom:1px solid var(--color-border-default)}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:flex-start;gap:1.25rem}
.header-logo{width:48px;height:48px;border-radius:50%;overflow:hidden;flex-shrink:0}
.header-logo img{display:block;width:100%;height:100%;object-fit:cover}
.header-eyebrow{font-family:var(--font-display);font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--color-brand-primary);margin-bottom:4px}
.header-title{font-family:var(--font-display);font-size:32px;font-weight:900;text-transform:uppercase;color:var(--color-text-on-navy);line-height:1.05;margin-bottom:3px}
.header-sub{color:rgba(255,255,255,0.5);font-size:13px}

/* FILTERS BAR */
.filters-bar{max-width:1400px;margin:0 auto;padding:1rem 2.5rem;display:flex;gap:1rem;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--color-border-default)}
.filter-group{display:flex;align-items:center;gap:8px}
.filter-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--color-text-secondary);white-space:nowrap}
.filter-select{background:var(--color-surface-elevated);border:1px solid var(--color-border-default);color:var(--color-text-primary);font-family:var(--font-body);font-size:13px;padding:7px 12px;border-radius:var(--r-md);outline:none;transition:border-color 0.15s;min-width:180px;cursor:pointer}
.filter-select:focus{border-color:var(--color-brand-primary)}
.filter-divider{width:1px;height:28px;background:var(--color-border-default)}
.client-badge{display:flex;align-items:center;gap:8px;padding:6px 14px;background:rgba(245,196,0,0.10);border:1px solid rgba(245,196,0,0.25);border-radius:var(--r-pill);font-size:12px;font-weight:600;color:var(--color-brand-primary)}
.client-badge-dot{width:8px;height:8px;border-radius:50%;background:var(--color-brand-primary)}

/* MAIN */
.main{max-width:1400px;margin:0 auto;padding:2rem 2.5rem}

/* NO CLIENT PROMPT */
.no-client{text-align:center;padding:5rem 2rem;color:var(--color-text-secondary)}
.no-client-icon{font-size:56px;margin-bottom:1.25rem}
.no-client-title{font-family:var(--font-display);font-size:24px;font-weight:800;text-transform:uppercase;color:var(--color-text-primary);margin-bottom:0.5rem}
.no-client-sub{font-size:14px;max-width:420px;margin:0 auto;line-height:1.6}

/* SECTION HEADING */
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:0.875rem}
.section-title{font-family:var(--font-display);font-size:18px;font-weight:800;text-transform:uppercase;letter-spacing:0.04em;color:var(--color-text-primary)}
.section-meta{font-size:12px;color:var(--color-text-secondary)}

/* CLIENT SUMMARY STRIP */
.client-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:0.875rem;margin-bottom:2rem}
.cs-card{background:var(--color-surface-base);border:1px solid var(--color-border-default);border-radius:var(--r-lg);padding:1rem 1.25rem}
.cs-card.accent{border-color:var(--color-brand-primary);background:rgba(245,196,0,0.05)}
.cs-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--color-text-secondary);margin-bottom:5px}
.cs-value{font-family:var(--font-display);font-size:26px;font-weight:900;color:var(--color-brand-primary);line-height:1}
.cs-value.neutral{color:var(--color-text-primary)}
.cs-sub{font-size:11px;color:var(--color-text-secondary);margin-top:3px}

/* PRICE TABLE */
.price-table-wrap{background:var(--color-surface-base);border:1px solid var(--color-border-default);border-radius:var(--r-xl);overflow:hidden;margin-bottom:2.5rem}
.pt-category-row{background:var(--color-surface-elevated);padding:10px 20px;font-family:var(--font-display);font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--color-text-secondary);border-bottom:1px solid var(--color-border-default)}
table.price-table{width:100%;border-collapse:collapse}
table.price-table thead th{background:var(--color-surface-sunken);font-family:var(--font-display);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--color-text-secondary);padding:10px 16px;text-align:left;border-bottom:2px solid var(--color-border-default);white-space:nowrap;position:sticky;top:0;z-index:2}
table.price-table thead th.right{text-align:right}
table.price-table thead th.center{text-align:center}
table.price-table thead th.col-client{color:var(--color-brand-primary);border-bottom-color:var(--color-brand-primary)}
table.price-table thead th.col-t1{color:var(--_teal-light)}
table.price-table thead th.col-t2{color:var(--_y200)}
table.price-table thead th.col-t3{color:var(--_coral-light)}
.theme-light table.price-table thead th.col-t1{color:var(--_teal-dark)}
.theme-light table.price-table thead th.col-t2{color:var(--_y900)}
.theme-light table.price-table thead th.col-t3{color:#C0392B}
table.price-table tbody tr{transition:background 0.1s}
table.price-table tbody tr:hover{background:var(--color-surface-overlay)}
table.price-table tbody tr:not(:last-child) td{border-bottom:1px solid var(--color-border-subtle)}
table.price-table td{padding:12px 16px;font-size:13px;vertical-align:middle}
table.price-table td.right{text-align:right}
table.price-table td.center{text-align:center}
.prod-name{font-weight:500;color:var(--color-text-primary)}
.prod-cat{font-size:11px;color:var(--color-text-secondary);margin-top:1px}

/* PRICE CELL */
.price-cell{text-align:right}
.price-main{font-family:var(--font-display);font-size:16px;font-weight:800;color:var(--color-text-primary)}
.price-qty{font-size:10px;color:var(--color-text-tertiary);margin-top:2px}
.price-disc{font-size:10px;font-weight:700;margin-top:2px}
.price-disc.step{color:var(--color-success-fg)}
.price-disc.total{color:var(--color-warning-fg)}

/* CLIENT PRICE CELL */
.client-price-cell{text-align:right}
.cp-main{font-family:var(--font-display);font-size:16px;font-weight:900;color:var(--color-brand-primary)}
.cp-diff{font-size:10px;font-weight:700;margin-top:2px}
.cp-diff.above{color:var(--color-danger-fg)}
.cp-diff.below{color:var(--color-success-fg)}
.cp-diff.equal{color:var(--color-text-tertiary)}
.cp-qty{font-size:10px;color:var(--color-text-tertiary);margin-top:2px}
.cp-nodata{font-size:12px;color:var(--color-text-tertiary);font-style:italic}

/* TIER HEADER CELLS */
.th-tier{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.th-tier-name{font-size:11px;font-weight:800;letter-spacing:0.06em}
.th-tier-qty{font-size:9px;font-weight:400;opacity:0.7;text-transform:none;letter-spacing:0}

/* BEST TIER HIGHLIGHT */
table.price-table tbody tr td.best-col{background:rgba(45,140,122,0.08);position:relative}
table.price-table tbody tr td.best-col .price-main{color:var(--color-success-fg)}

/* MOBILE PORTRAIT — GENERAL LAYOUT + CUSTOMER LOOKUP AS CARDS
   Scoped to portrait only: a phone rotated to landscape gets the compact
   real-table treatment below instead (more width to work with, and reps
   asked for the table to stay a table there rather than becoming cards). */
@media (max-width:680px) and (orientation:portrait){
  .theme-bar{padding:6px 12px;flex-wrap:wrap;justify-content:center;row-gap:4px}
  .theme-bar-title{font-size:10px}
  .theme-bar button{padding:4px 10px;font-size:11px}
  .page-header{padding:1rem 1.25rem}
  .header-logo{width:40px;height:40px}
  .header-title{font-size:23px}
  .header-sub{font-size:11px}
  .tab-bar{padding:0 1.25rem}
  .tab-btn{margin-right:1rem;font-size:12px;padding:0.75rem 0.15rem}
  .main{padding:1.25rem 1rem}
  .section-title{font-size:15px}

  .filters-bar{flex-direction:column;align-items:stretch;gap:0.6rem}
  .filter-group{width:100%;justify-content:space-between}
  .filter-select{flex:1;min-width:0}
  .filter-divider{display:none}
  .client-badge{width:100%;justify-content:center}

  .client-strip{grid-template-columns:repeat(2,1fr)}

  /* Overview — stack the product label above its bar instead of a fixed
     210px side column, which leaves almost no room for the bar itself
     on a narrow screen */
  .ov-legend{gap:0.6rem;padding:0.5rem 0.75rem}
  .ov-month-nav{margin-left:0;width:100%;justify-content:center;margin-top:6px}
  .ov-row{grid-template-columns:1fr;gap:0.15rem;padding:0.35rem 0}
  .ov-label{padding-top:0}
  .ov-track-wrap{margin-top:20px}

  table.price-table thead{display:none}
  table.price-table, table.price-table tbody{display:block;width:100%}
  table.price-table tr:not(.pt-cat-tr){
    display:block;background:var(--color-surface-base);
    border:1px solid var(--color-border-default);border-radius:var(--r-lg);
    margin:10px 12px;overflow:hidden;
  }
  table.price-table tr:not(.pt-cat-tr) td{
    display:block;padding:9px 14px;font-size:13px;text-align:right;
    border-bottom:1px solid var(--color-border-subtle) !important;
  }
  table.price-table tr:not(.pt-cat-tr) td:last-child{border-bottom:none !important}
  table.price-table tr:not(.pt-cat-tr) td[data-label]::before{
    content:attr(data-label);display:block;font-size:10px;font-weight:700;text-transform:uppercase;
    letter-spacing:0.05em;color:var(--color-text-secondary);text-align:left;margin-bottom:3px;
  }
  table.price-table tr:not(.pt-cat-tr) td:first-child{
    text-align:left;background:var(--color-surface-elevated);padding:10px 14px;
  }
  table.price-table tr:not(.pt-cat-tr) td:first-child::before{content:none}
  table.price-table tr:not(.pt-cat-tr) td:first-child .prod-name{font-size:14px;font-weight:700}
  .pt-category-row{margin:16px 12px 6px;border-radius:var(--r-md);border-bottom:none}
}

/* MOBILE LANDSCAPE — keep the real table, compact it hard, and let it
   scroll sideways as a fallback. (max-height:500px) targets phones held in
   landscape (roughly ≤430px tall even on the largest handsets) while
   excluding tablets/laptops in landscape, which already have enough width
   for the full desktop table. Compacted column widths total ~550px, which
   fits inside the content area on nearly every phone in landscape without
   scrolling — horizontal scroll is kept as a guaranteed fallback for the
   few devices where it still doesn't quite fit. */
@media (orientation:landscape) and (max-height:500px){
  .theme-bar{padding:4px 12px;flex-wrap:wrap;justify-content:center;row-gap:3px}
  .theme-bar-title{font-size:10px}
  .page-header{padding:0.5rem 1.25rem}
  .header-logo{width:30px;height:30px}
  .header-eyebrow{font-size:10px;margin-bottom:2px}
  .header-title{font-size:18px;margin-bottom:1px}
  .header-sub{font-size:9px}
  .tab-bar{padding:0 1.25rem}
  .tab-btn{padding:0.5rem 0.15rem;margin-right:1rem;font-size:11px}
  .filters-bar{padding:0.5rem 1.25rem}
  .filter-select{min-width:130px;font-size:12px}
  .main{padding:0.75rem 1rem}
  .client-strip{gap:0.5rem;margin-bottom:1rem}
  .cs-card{padding:0.6rem 0.75rem}
  .cs-value{font-size:19px}

  .price-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table.price-table{width:auto;min-width:100%}
  table.price-table thead th{padding:5px 6px;font-size:9px;white-space:normal}
  table.price-table thead th .th-tier-qty{display:none}
  table.price-table td{padding:5px 6px;font-size:11px}

const REP_COLORS = {AC:'var(--_violet)',AP:'var(--_terra)',BV:'var(--_teal)',NP:'var(--_coral)',BM:'var(--_pink)'};

/* ── INIT ── */
function init(){
  document.getElementById('footer-date').textContent = 'Generated '+new Date().toLocaleDateString('en-ZA',{day:'numeric',month:'long',year:'numeric'});
  document.getElementById('footer-count').textContent = CLIENTS.length+' clients';
  document.getElementById('client-count-hdr').textContent = CLIENTS.length+' clients loaded';

  const repSel = document.getElementById('ctrl-rep');
  [...new Set(CLIENTS.map(c=>c.rep))].sort().forEach(r=>{
    const o=document.createElement('option');o.value=r;o.textContent=(REP_NAMES[r]||r)+' ('+r+')';repSel.appendChild(o);
  });
  rebuildRegionFilter();
  rebuildClientFilter();
  render();
}

function rebuildRegionFilter(){
  const repVal=document.getElementById('ctrl-rep').value;
  const sel=document.getElementById('ctrl-region');
  const prev=sel.value;
  sel.innerHTML='<option value="">All Regions</option>';
  const subset=repVal?CLIENTS.filter(c=>c.rep===repVal):CLIENTS;
  [...new Set(subset.map(c=>c.region))].sort().forEach(r=>{
    const o=document.createElement('option');o.value=r;o.textContent=r;
    if(r===prev)o.selected=true;
    sel.appendChild(o);
  });
}

function rebuildClientFilter(){
  const repVal=document.getElementById('ctrl-rep').value;
  const regVal=document.getElementById('ctrl-region').value;
  const sel=document.getElementById('ctrl-client');
  const prev=sel.value;
  sel.innerHTML='<option value="">— Select Customer —</option>';
  let sub=CLIENTS;
  if(repVal) sub=sub.filter(c=>c.rep===repVal);
  if(regVal) sub=sub.filter(c=>c.region===regVal);
  sub.forEach(c=>{
    const o=document.createElement('option');o.value=c.id;o.textContent=c.name+' ('+c.id+')';
    if(c.id===prev)o.selected=true;
    sel.appendChild(o);
  });
}

function onRepChange(){
  document.getElementById('ctrl-region').value='';
  document.getElementById('ctrl-client').value='';
  calcClient=null;
  rebuildRegionFilter();
  rebuildClientFilter();
  render();
}
function onRegionChange(){
  document.getElementById('ctrl-client').value='';
  calcClient=null;
  rebuildClientFilter();
  render();
}
function onClientChange(){
  const cid=document.getElementById('ctrl-client').value;
  calcClient=cid?CLIENTS.find(c=>c.id===cid):null;
  const badge=document.getElementById('selected-badge');
  const badgeName=document.getElementById('selected-badge-name');
  if(calcClient){badge.style.display='flex';badgeName.textContent=calcClient.name;}
  else{badge.style.display='none';}
  render();
}

let activeTab = 'overview';
function setTab(tab){
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  document.getElementById('filters-bar').style.display = tab==='lookup' ? 'flex' : 'none';
  render();
}

function render(){
  if(activeTab==='overview'){
    document.getElementById('main-content').innerHTML = renderOverview();
    return;
  }
  document.getElementById('main-content').innerHTML = calcClient ? renderPriceTable() : renderNoClient();
}

/* ── OVERVIEW — VOLUME DISCOUNT TRACKER ── */
let overviewMonthIdx = null;
function currentMonthIdx(){
  if(overviewMonthIdx===null){
    overviewMonthIdx = Math.max(0, MONTHLY_OVERVIEW.months.indexOf(MONTHLY_OVERVIEW.default));
  }
  return overviewMonthIdx;
}
function shiftMonth(delta){
  const n = MONTHLY_OVERVIEW.months.length;
  overviewMonthIdx = Math.min(n-1, Math.max(0, currentMonthIdx()+delta));
  render();
}

function renderOverview(){
  const t1prods = TIERS[0].products;
  const cats = [...new Set(t1prods.map(p=>p.cat))];
  const idx = currentMonthIdx();
  const monthKey = MONTHLY_OVERVIEW.months[idx];
  const entry = MONTHLY_OVERVIEW.byMonth[monthKey];
  const atStart = idx<=0, atEnd = idx>=MONTHLY_OVERVIEW.months.length-1;
  const factorLabel = entry.seasonalFactor!=null ? ` &middot; seasonal factor ${entry.seasonalFactor}` : ' &middot; no seasonal factor defined';

  let html = `<div class="ov-legend">
    ${Object.keys(REP_NAMES).map(r=>`<div class="ov-legend-item"><span class="ov-legend-dot" style="background:${REP_COLORS[r]}"></span>${REP_NAMES[r]}</div>`).join('')}
    <div class="ov-month-nav">
      <button class="ov-month-btn" onclick="shiftMonth(-1)" ${atStart?'disabled':''} aria-label="Previous month">&#8249;</button>
      <span class="ov-month-label">${entry.label}<span class="ov-month-factor">${factorLabel}</span></span>
      <button class="ov-month-btn" onclick="shiftMonth(1)" ${atEnd?'disabled':''} aria-label="Next month">&#8250;</button>
    </div>
  </div>`;

  cats.forEach(cat=>{
    html += `<div class="section-title ov-cat">${cat}</div>`;
    t1prods.filter(p=>p.cat===cat).forEach(p=>{ html += renderOverviewRow(p, entry); });
  });

  html += `<div class="ov-footnote">
    Bars show ${entry.label}'s volume booked, stacked by rep, against this product's monthly volume-discount tiers${entry.seasonalFactor!=null?` (baseline target &times; ${entry.seasonalFactor} seasonal factor)`:' (no seasonal factor defined for this month — showing baseline, unadjusted targets)'}.
    Dashed markers show the quantity needed to reach each tier, with that tier's target price in brackets. The flag above the end of the bar is the
    blended average selling price achieved across all reps so far this month.
  </div>`;
  return html;
}

function renderOverviewRow(p, entry){
  const volKey = tierNameToVolKey(p.name);
  const t2p = TIERS[1].products.find(x=>x.name===p.name);
  const t3p = TIERS[2].products.find(x=>x.name===p.name);
  const ov = entry.data[volKey] || {repVolumes:{},avgPrice:null};
  const repVols = ov.repVolumes||{};
  const total = Object.values(repVols).reduce((s,v)=>s+v,0);
  const factor = entry.seasonalFactor!=null ? entry.seasonalFactor : 1;
  const t1q = Math.round(p.qty*factor), t2q = t2p?Math.round(t2p.qty*factor):null, t3q = t3p?Math.round(t3p.qty*factor):null;
  const topQty = t3q || t1q;
  const scaleMax = Math.max(topQty*1.15, total*1.05, 1);
  const pct = q => Math.min(100, q/scaleMax*100);

  let segLeft = 0, segsHtml = '';
  Object.keys(REP_NAMES).forEach(rep=>{
    const q = repVols[rep]||0;
    if(q<=0) return;
    segsHtml += `<div class="ov-seg" style="left:${pct(segLeft)}%;width:${(pct(segLeft+q)-pct(segLeft)).toFixed(3)}%;background:${REP_COLORS[rep]}" title="${REP_NAMES[rep]}: ${fmtQty(q)} units"></div>`;
    segLeft += q;
  });

  const markers = [
    {q:t1q, price:p.price,               label:'T1'},
    {q:t2q, price:t2p ? t2p.price : null, label:'T2'},
    {q:t3q, price:t3p ? t3p.price : null, label:'T3'},
  ].filter(m=>m.q!=null);

  const markersHtml = markers.map((m,i)=>`
    <div class="ov-marker-line" style="left:${pct(m.q)}%"></div>
    <div class="ov-marker-label${i%2?' ov-marker-label--low':''}" style="left:${pct(m.q)}%"><b>${fmtQty(m.q)}</b>${m.label} (${fmt(m.price)})</div>
  `).join('');

  const flagHtml = total>0
    ? `<div class="ov-avg-flag" style="left:${Math.min(pct(total),94).toFixed(2)}%">
         <span class="ov-avg-price">${ov.avgPrice!=null?fmt(ov.avgPrice):'—'}</span>
         <span class="ov-avg-caption">avg price</span>
       </div>`
    : `<div class="ov-nodata">No sales booked this month</div>`;

  return `<div class="ov-row">
    <div class="ov-label">
      <div class="ov-label-name">${p.name}</div>
      <div class="ov-label-sub">${fmtQty(total)} units booked</div>
    </div>
    <div class="ov-track-wrap">
      ${flagHtml}
      <div class="ov-track">${segsHtml}${markersHtml}</div>
    </div>
  </div>`;
}

/* ── NO CLIENT ── */
function renderNoClient(){
  const rep=document.getElementById('ctrl-rep').value;
  const reg=document.getElementById('ctrl-region').value;
  let sub=CLIENTS;
  if(rep) sub=sub.filter(c=>c.rep===rep);
  if(reg) sub=sub.filter(c=>c.region===reg);
  return `<div class="no-client">
    <div class="no-client-icon">&#x1F4CB;</div>
    <div class="no-client-title">Select a Customer</div>
    <div class="no-client-sub">${sub.length} customer${sub.length!==1?'s':''} available${rep?' for '+(REP_NAMES[rep]||rep):''}${reg?' in '+reg:''}.<br>Use the filters above to find a customer and see their pricing vs the tier structure.</div>
  </div>`;
}

/* ── MAIN PRICE TABLE ── */
function renderPriceTable(){
  const c = calcClient;
  const t1prods = TIERS[0].products;
  const cats = [...new Set(t1prods.map(p=>p.cat))];

  /* Summary counts — tier qualification is against THIS customer's share of
     total company volume for the product, not the raw company-wide threshold */
  let qualT3=0,qualT2=0,qualT1=0,belowT1=0,hasData=0;
  t1prods.forEach(p=>{
    const vk=tierNameToVolKey(p.name);
    const lp=c.lastMonthPrices&&c.lastMonthPrices[vk]?c.lastMonthPrices[vk]:null;
    if(lp) hasData++;
    const t2=TIERS[1].products.find(x=>x.name===p.name);
    const t3=TIERS[2].products.find(x=>x.name===p.name);
    const vol=(c.volumes&&c.volumes[vk])||0;
    const totalVol = TOTAL_VOLUMES[vk]||0;
    const pctShare = totalVol>0 ? vol/totalVol : 0;
    const custT1 = p.qty*pctShare, custT2 = t2?t2.qty*pctShare:0, custT3 = t3?t3.qty*pctShare:0;
    /* vol>0 guard: a customer with zero volume has a zero proportional threshold
       too, and 0>=0 would otherwise wrongly read as "qualified" */
    if(vol<=0) belowT1++;
    else if(t3&&vol>=custT3) qualT3++;
    else if(t2&&vol>=custT2) qualT2++;
    else if(vol>=custT1) qualT1++;
    else belowT1++;
  });

  /* avg last-month price across products with data */
  const avgLastPrice = hasData>0
    ? Object.values(c.lastMonthPrices||{}).reduce((s,v)=>s+v,0)/Object.values(c.lastMonthPrices||{}).length
    : null;

  let html = `
  <!-- Customer strip -->
  <div class="client-strip">
    <div class="cs-card accent">
      <div class="cs-label">Customer</div>
      <div class="cs-value neutral" style="font-size:16px;line-height:1.25;padding-top:2px">${c.name}</div>
      <div class="cs-sub">${REP_NAMES[c.rep]||c.rep} &middot; ${c.region||'—'} &middot; ${c.id}</div>
    </div>
    <div class="cs-card">
      <div class="cs-label">Products at Tier 3</div>
      <div class="cs-value" style="color:var(--color-success-fg)">${qualT3}</div>
      <div class="cs-sub">Best price</div>
    </div>
    <div class="cs-card">
      <div class="cs-label">Products at Tier 2</div>
      <div class="cs-value" style="color:var(--_y400)">${qualT2}</div>
      <div class="cs-sub">Mid pricing</div>
    </div>
    <div class="cs-card">
      <div class="cs-label">Below Tier 1</div>
      <div class="cs-value" style="color:var(--color-danger-fg)">${belowT1}</div>
      <div class="cs-sub">No rebate yet</div>
    </div>
    <div class="cs-card">
      <div class="cs-label">Products with price data</div>
      <div class="cs-value neutral">${hasData}</div>
      <div class="cs-sub">of ${t1prods.length} products</div>
    </div>
  </div>

  <!-- Price table -->
  <div class="price-table-wrap">
    <table class="price-table">
      <thead>
        <tr>
          <th style="width:220px">Product</th>
          <th class="right" style="width:130px;color:var(--color-info-fg);border-bottom-color:var(--color-info-fg)">
            <div class="th-tier">
              <span class="th-tier-name">3-Mo Avg Price</span>
              <span class="th-tier-qty">Rolling 3-month</span>
            </div>
          </th>
          <th class="right" style="width:130px">
            <div class="th-tier">
              <span class="th-tier-name">3-Month Avg</span>
              <span class="th-tier-qty">Avg units / month</span>
            </div>
          </th>
          <th class="right col-client" style="width:150px">
            <div class="th-tier">
              <span class="th-tier-name">LM (Last Month)</span>
              <span class="th-tier-qty">${c.name} &middot; avg price</span>
            </div>
          </th>
          <th class="right col-t1" style="width:145px">
            <div class="th-tier">
              <span class="th-tier-name">Tier 1</span>
              <span class="th-tier-qty">Entry &middot; customer share</span>
            </div>
          </th>
          <th class="center" style="width:80px;color:var(--color-text-tertiary);font-size:10px">T1&rarr;T2</th>
          <th class="right col-t2" style="width:145px">
            <div class="th-tier">
              <span class="th-tier-name">Tier 2</span>
              <span class="th-tier-qty">Mid-volume &middot; customer share</span>
            </div>
          </th>
          <th class="center" style="width:80px;color:var(--color-text-tertiary);font-size:10px">T2&rarr;T3</th>
          <th class="right col-t3" style="width:145px">
            <div class="th-tier">
              <span class="th-tier-name">Tier 3</span>
              <span class="th-tier-qty">High-volume &middot; customer share</span>
            </div>
          </th>
          <th class="center" style="width:90px;color:var(--color-text-tertiary);font-size:10px">T1&rarr;T3</th>
        </tr>
      </thead>
      <tbody>`;

  cats.forEach(cat=>{
    const catProds = t1prods.filter(p=>p.cat===cat);
    html += `<tr class="pt-cat-tr"><td colspan="10" class="pt-category-row" style="padding:8px 16px;background:var(--color-surface-elevated);font-family:var(--font-display);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--color-text-secondary)">${cat}</td></tr>`;

    catProds.forEach(p=>{
      const vk  = tierNameToVolKey(p.name);
      const t2p = TIERS[1].products.find(x=>x.name===p.name);
      const t3p = TIERS[2].products.find(x=>x.name===p.name);
      const lp  = c.lastMonthPrices&&c.lastMonthPrices[vk] ? c.lastMonthPrices[vk] : null;
      const lmQty = c.lastMonthQty&&c.lastMonthQty[vk] ? c.lastMonthQty[vk] : null;

      /* discount steps */
      const d12 = t2p ? ((p.price-t2p.price)/p.price*100) : null;
      const d23 = t2p&&t3p ? ((t2p.price-t3p.price)/t2p.price*100) : null;
      const d13 = t3p ? ((p.price-t3p.price)/p.price*100) : null;

      /* client price vs T1 */
      const diff  = lp!=null ? lp - p.price : null;
      const diffP = diff!=null ? Math.abs(diff/p.price*100).toFixed(1) : null;
      const arrow = diff==null?null : diff>0.005?'&#x25B2;':diff<-0.005?'&#x25BC;':'=';
      const diffCls = diff==null?'':diff>0.005?'above':diff<-0.005?'below':'equal';
      const diffLabel = diff==null?''
        : diff>0.005  ? '+'+diffP+'% above T1'
        : diff<-0.005 ? diffP+'% below T1'
        : 'At T1 price';

      /* This customer's % share of total company volume for this product,
         applied to the company-wide tier thresholds to get a fair,
         customer-sized target instead of comparing against the full company total */
      const vol      = (c.volumes&&c.volumes[vk])||0;
      const totalVol  = TOTAL_VOLUMES[vk]||0;
      const pctShare  = totalVol>0 ? vol/totalVol : 0;
      const pctLabel  = totalVol>0 ? (pctShare*100).toFixed(1)+'% share' : 'no company volume yet';
      const custT1 = p.qty*pctShare;
      const custT2 = t2p ? t2p.qty*pctShare : null;
      const custT3 = t3p ? t3p.qty*pctShare : null;

      /* vol-based tier qualification, against this customer's proportional threshold.
         vol>0 guard: zero volume also means a zero proportional threshold, and
         0>=0 would otherwise wrongly read as "qualified". */
      let bestTier=0;
      if(vol>0){
        if(t3p&&vol>=custT3) bestTier=3;
        else if(t2p&&vol>=custT2) bestTier=2;
        else if(vol>=custT1) bestTier=1;
      }

      const clientCell = lp!=null
        ? `<td class="right${bestTier>=1?' best-col':''}" data-label="LM (Last Month)">
            <div class="cp-main">${fmt(lp)}</div>
            <div class="cp-diff ${diffCls}">${arrow?arrow+' ':''} ${diffLabel}</div>
            ${lmQty!=null?`<div class="cp-qty">${fmtQty(lmQty)} units sold</div>`:''}
           </td>`
        : `<td class="right" data-label="LM (Last Month)"><span class="cp-nodata">No invoice data</span></td>`;

      /* rolling 3-month volume-weighted average selling price */
      const tmp = c.threeMonthPrices&&c.threeMonthPrices[vk] ? c.threeMonthPrices[vk] : null;
      const threeMoPriceCell = tmp!=null
        ? `<td class="right" data-label="3-Mo Avg Price">
            <div class="cp-main" style="color:var(--color-info-fg)">${fmt(tmp)}</div>
           </td>`
        : `<td class="right" data-label="3-Mo Avg Price"><span class="cp-nodata">No data</span></td>`;

      /* rolling 3-month average quantity = 3-month cumulative volume ÷ 3 */
      const threeMoAvgQty = vol>0 ? vol/3 : null;
      const threeMoCell = threeMoAvgQty!=null
        ? `<td class="right" data-label="3-Month Avg">
            <div class="cp-main">${fmtQty(Math.round(threeMoAvgQty))}</div>
            <div class="cp-qty">${fmtQty(vol)} units / 3 mo</div>
           </td>`
        : `<td class="right" data-label="3-Month Avg"><span class="cp-nodata">No data</span></td>`;

      const t1Cell = `<td class="right" data-label="Tier 1">
        <div class="price-main">${fmt(p.price)}</div>
        <div class="price-qty">${fmtQty(Math.round(custT1))} units (${pctLabel})</div>
      </td>`;

      const t2Cell = t2p
        ? `<td class="right${bestTier>=2?' best-col':''}" data-label="Tier 2">
            <div class="price-main">${fmt(t2p.price)}</div>
            <div class="price-qty">${fmtQty(Math.round(custT2))} units (${pctLabel})</div>
           </td>`
        : `<td class="right" data-label="Tier 2" style="color:var(--color-text-tertiary)">—</td>`;

      const t3Cell = t3p
        ? `<td class="right${bestTier>=3?' best-col':''}" data-label="Tier 3">
            <div class="price-main">${fmt(t3p.price)}</div>
            <div class="price-qty">${fmtQty(Math.round(custT3))} units (${pctLabel})</div>
           </td>`
        : `<td class="right" data-label="Tier 3" style="color:var(--color-text-tertiary)">—</td>`;

      const discCell = (disc,cls,label)=>disc!=null
        ? `<td class="center" data-label="${label}"><span style="font-family:var(--font-display);font-size:12px;font-weight:800;color:var(--color-success-fg)">&#x2193; ${disc.toFixed(1)}%</span></td>`
        : `<td data-label="${label}"></td>`;

      const totalCell = d13!=null
        ? `<td class="center" data-label="T1&rarr;T3"><span style="font-family:var(--font-display);font-size:12px;font-weight:800;color:var(--color-warning-fg)">&#x2193; ${d13.toFixed(1)}%</span></td>`
        : `<td data-label="T1&rarr;T3"></td>`;

      html += `<tr>
        <td data-label="Product"><div class="prod-name">${p.name}</div></td>
        ${threeMoPriceCell}
        ${threeMoCell}
        ${clientCell}
        ${t1Cell}
        ${discCell(d12,null,'T1&rarr;T2')}
        ${t2Cell}
        ${discCell(d23,null,'T2&rarr;T3')}
        ${t3Cell}
        ${totalCell}
      </tr>`;
    });
  });

  html += `</tbody></table></div>
  <div style="font-size:11px;color:var(--color-text-secondary);padding-bottom:0.5rem">
    <strong style="color:var(--color-info-fg)">3-Mo Avg Price</strong> = volume-weighted average selling price over the rolling 3-month window &middot; <strong>3-Month Avg</strong> = average units invoiced per month over that same window (3-month total &divide; 3) &middot; <strong>LM (Last Month)</strong> = volume-weighted average invoice price for the most recent complete calendar month &middot; <strong>units sold</strong> = total units invoiced to this customer in that same month &middot;
    <strong>Tier units</strong> = the company-wide tier threshold &times; this customer's % share of total company volume for that product (3-month window) &middot;
    <span style="color:var(--color-danger-fg)">&#x25B2; above T1</span> = customer paying above tier rate &middot;
    <span style="color:var(--color-success-fg)">&#x25BC; below T1</span> = customer on discount &middot;
    Green highlight = customer qualifies for that tier by volume, against their own proportional target
  </div>`;

  return html;
}

/* ── THEME ── */
const OLY_THEMES=['theme-light','theme-dark','theme-brand','theme-navy'];
function olyTheme(t,btn){
  document.documentElement.classList.remove(...OLY_THEMES);
  document.documentElement.classList.add(t);
  localStorage.setItem('oly-theme',t);
  document.querySelectorAll('.theme-bar button').forEach(b=>b.classList.toggle('active',b===btn));
}

window.addEventListener('DOMContentLoaded', init);
</script>
